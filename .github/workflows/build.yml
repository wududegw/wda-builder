name: Build WDA for iOS 18

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout WebDriverAgent
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: master
          submodules: true

      - name: Setup Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Show versions
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Bootstrap
        run: |
          if [ -f "./Scripts/bootstrap.sh" ]; then
            bash ./Scripts/bootstrap.sh -d
          fi

      - name: Build WDA
        run: |
          xcodebuild \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            CONFIGURATION_BUILD_DIR=$PWD/build 2>&1 | tail -30

      - name: Ad-hoc sign
        run: |
          APP="$PWD/build/WebDriverAgentRunner-Runner.app"
          find "$APP" -name "*.framework" -type d | while read fw; do
            BIN="$fw/$(basename ${fw%.framework})"
            [ -f "$BIN" ] && codesign --force --sign - "$BIN" 2>/dev/null || true
          done
          find "$APP/PlugIns" -name "*.xctest" -type d | while read xt; do
            BIN="$xt/$(basename ${xt%.xctest})"
            [ -f "$BIN" ] && codesign --force --sign - "$BIN"
          done
          find "$APP" -name "*.dylib" | while read f; do
            codesign --force --sign - "$f" 2>/dev/null || true
          done
          MAIN="$APP/WebDriverAgentRunner-Runner"
          [ -f "$MAIN" ] && codesign --force --sign - "$MAIN"
          codesign --force --deep --sign - "$APP"

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgent-iOS18.ipa Payload/
          ls -lh WebDriverAgent-iOS18.ipa

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WDA-iOS18
          path: WebDriverAgent-iOS18.ipa
          retention-days: 30
